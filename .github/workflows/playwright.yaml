name: Playwright Tests

on: ["push", "pull_request"]

jobs:
  playwright:
    runs-on: ubuntu-latest

    # Simple InvenTree setup
    env:
      INVENTREE_SITE_URL: http://localhost:8000
      INVENTREE_DB_ENGINE: sqlite3
      INVENTREE_DB_NAME: inventree_db_latest.sqlite3
      INVENTREE_BACKUP_DIR: $GITHUB_WORKSPACE/path/to/backup
      INVENTREE_MEDIA_ROOT: $GITHUB_WORKSPACE/path/to/media
      INVENTREE_STATIC_ROOT: $GITHUB_WORKSPACE/path/to/static
      INVENTREE_PLUGINS_ENABLED: true
      INVENTREE_DEBUG: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.11
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 20
      - name: Build Plugin
        run: |
          pip install .
          create-inventree-plugin --default
          cd MyCustomPlugin/frontend
          npm install && npm translate && npm build
      - name: Install Plugin
        run: |
          cd MyCustomPlugin
          pip install .
      - name: Install InvenTree
        run: |
          sudo apt-get install python3-dev python3-pip python3-venv python3
          pip3 install invoke
          git clone --depth 1 https://github.com/inventree/inventree inventree
          cd inventree
          invoke install
          invoke dev.setup-test -ui
      - name: Start InvenTree Server
        run: |
          cd inventree
          invoke dev.server &
          sleep 10
      - name: Setup Playwright
        run: |
          cd playwright
          npx playwright install --with-deps
      - name: Run Playwright Tests
        run: |
          cd playwright
          npx playwright test
